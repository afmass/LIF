project:
  type: website
  output-dir: docs
  
website:
  site-url: https://lif-geodata.github.io/LIF/
  description: "Laboratory of Forest Inventory website."
  navbar:
    show-title: false  # <-- hides title from navbar
    logo: assets/images/logo_lif_transp.png
    left:
      - href: index.qmd
        text: Home
      - href: team.qmd
        text: Staff
      - href: publications.qmd
        text: Publications
      - href: projects.qmd
        text: Projects
      - href: joinus.qmd
        text: Join us
    right:
      - href: "https://geodata-paris.fr/"
        text: '<img src="assets/images/geodata_paris_logo.png" style="height:30px; margin-right:0.5em;">'
      - href: "https://www.ign.fr/"
        text: '<img src="assets/images/ign_logo.png" style="height:30px; margin-right:0.5em;">'
      - href: about.qmd
        text: About

format:
  html:
    theme:
      - cosmo
    toc: true
    title-block: false   # <-- hides the <h1> title on every page
    include-in-header: assets/html/meta.html
    css: 
      - assets/css/styles.css
      - assets/css/publications.css
      - assets/css/team.css
      - assets/css/projects.css
execute:
  echo: false
  working-dir: project
editor: visual

